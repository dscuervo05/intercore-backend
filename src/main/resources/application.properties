spring.application.name=pro
# 1. Configuraci\u00f3n de la Base de Datos (PostgreSQL)
# Aseg\u00farate de que el nombre 'nilo_pro_db' sea el mismo que creaste en pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/App
spring.datasource.username=postgres
spring.datasource.password=12345

# 2. Configuraci\u00f3n de Hibernate / JPA
# 'update' crear\u00e1 las tablas autom\u00e1ticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Configuraci\u00f3n del Servidor (Opcional)
server.port=8080
